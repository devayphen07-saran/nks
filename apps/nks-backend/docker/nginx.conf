# Nginx Rate Limiting Configuration for NKS Backend
#
# This file provides Nginx reverse proxy configuration with:
# - Global rate limiting (second line of defense)
# - Connection limits
# - Request buffering
# - Security headers
#
# Deploy this AFTER NestJS ThrottlerModule (first line of defense)
# Together: Defense in depth against DDoS and API abuse
#
# Usage:
# 1. Copy this file to /etc/nginx/conf.d/nks-backend.conf
# 2. Run: nginx -t (test configuration)
# 3. Run: systemctl reload nginx
#
# Or use in Docker:
# COPY nginx.conf /etc/nginx/conf.d/default.conf

# ─── Rate Limiting Zones ────────────────────────────────────────────────────
# Define named zones for rate limiting

# Global rate limit: 100 requests per second per IP
# Used for general API endpoints
limit_req_zone $binary_remote_addr zone=api_global:10m rate=100r/s;

# Auth endpoints: 10 requests per second per IP
# Stricter for login, password reset, etc.
limit_req_zone $binary_remote_addr zone=api_auth:10m rate=10r/s;

# OTP endpoints: 5 requests per minute per IP
# Very strict for OTP requests (prevent brute-force)
limit_req_zone $binary_remote_addr zone=api_otp:10m rate=5r/m;

# Public endpoints: 50 requests per second per IP
# Moderate for lookups, routes, etc.
limit_req_zone $binary_remote_addr zone=api_public:10m rate=50r/s;

# Connection limits: 100 concurrent connections per IP
limit_conn_zone $binary_remote_addr zone=addr:10m;

# ─── Upstream Backend ────────────────────────────────────────────────────────
upstream nks_backend {
  # NestJS backend server(s)
  server localhost:4000 max_fails=3 fail_timeout=30s;
  # For load balancing, add more:
  # server 10.0.1.10:4000 weight=5;
  # server 10.0.1.11:4000 weight=5;
  # server 10.0.1.12:4000 weight=5;

  keepalive 32;
}

# ─── Server Configuration ────────────────────────────────────────────────────
server {
  listen 80;
  server_name _;

  # Buffer sizes (prevent slowloris attacks)
  client_body_buffer_size 128k;
  client_max_body_size 10m;

  # Timeouts (prevent slowloris, keep-alive exhaustion)
  client_body_timeout 12s;
  client_header_timeout 12s;
  send_timeout 12s;
  keepalive_timeout 15s;

  # Slow client buffering (store request body before forwarding)
  # Protects backend from slow clients
  proxy_request_buffering on;

  # ─── Health Check Endpoint (no rate limiting) ────────────────────────────
  location /health {
    access_log off;
    return 200 "healthy\n";
    add_header Content-Type text/plain;
  }

  # ─── Metrics Endpoint (no rate limiting, but IP restricted) ──────────────
  location /metrics {
    # Only allow internal IPs
    allow 10.0.0.0/8;
    allow 127.0.0.1;
    deny all;
  }

  # ─── Auth Endpoints (strict rate limiting) ───────────────────────────────
  location ~ ^/api/v1/auth/(login|register|send-otp|verify-otp|reset-password) {
    # Apply auth rate limit: 10 req/sec per IP
    limit_req zone=api_auth burst=5 nodelay;

    # Log rate limit violations
    access_log /var/log/nginx/rate-limit.log
      '$remote_addr - $remote_user [$time_local] '
      '"$request" $status $body_bytes_sent '
      '$request_time $upstream_response_time';

    # Forward to backend
    proxy_pass http://nks_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
  }

  # ─── OTP Endpoints (very strict rate limiting) ──────────────────────────
  location ~ ^/api/v1/auth/otp/(send|verify) {
    # Apply OTP rate limit: 5 req/min per IP
    # This is in addition to NestJS OtpRateLimitService
    limit_req zone=api_otp burst=2 nodelay;

    # Connection limit: max 5 concurrent connections per IP
    limit_conn addr 5;

    # Log all OTP requests
    access_log /var/log/nginx/otp.log '$remote_addr [$time_local] "$request" $status';

    # Forward to backend
    proxy_pass http://nks_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
  }

  # ─── Public Endpoints (moderate rate limiting) ──────────────────────────
  location ~ ^/api/v1/(lookups|routes|roles) {
    # Apply public rate limit: 50 req/sec per IP
    limit_req zone=api_public burst=10 nodelay;

    # Forward to backend
    proxy_pass http://nks_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;
  }

  # ─── All Other Endpoints (default rate limiting) ───────────────────────
  location /api/ {
    # Apply global rate limit: 100 req/sec per IP
    limit_req zone=api_global burst=20 nodelay;

    # Connection limit: 100 concurrent per IP
    limit_conn addr 100;

    # Forward to backend
    proxy_pass http://nks_backend;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    # Timeouts for backend
    proxy_connect_timeout 30s;
    proxy_send_timeout 30s;
    proxy_read_timeout 30s;
  }

  # ─── Security Headers ────────────────────────────────────────────────────
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  # ─── Error Pages ────────────────────────────────────────────────────────
  error_page 429 /errors/429.json;
  error_page 502 /errors/502.json;
  error_page 503 /errors/503.json;

  location /errors/ {
    internal;
    default_type application/json;
  }
}

# ─── Error Response Bodies ──────────────────────────────────────────────────
# Create these files in Docker or on the host:
# /usr/share/nginx/html/errors/429.json
# {
#   "statusCode": 429,
#   "message": "Too many requests, please try again later",
#   "error": "Too Many Requests"
# }
